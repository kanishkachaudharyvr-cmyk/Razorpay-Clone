<svg width="600" height="350" viewBox="0 0 600 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b0000"/>
      <stop offset="100%" stop-color="#c10000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="350" rx="24" fill="url(#redGrad)"/>

  <!-- Globe -->
  <circle cx="430" cy="175" r="80" fill="#ffd27d"/>
  <ellipse cx="430" cy="175" rx="80" ry="30" fill="none" stroke="#caa24f" stroke-width="3"/>
  <ellipse cx="430" cy="175" rx="30" ry="80" fill="none" stroke="#caa24f" stroke-width="3"/>

  <!-- Currency notes -->
  <rect x="80" y="220" width="90" height="40" rx="6" fill="#ffffff"/>
  <rect x="110" y="190" width="90" height="40" rx="6" fill="#f1f1f1"/>
  <rect x="140" y="160" width="90" height="40" rx="6" fill="#e6e6e6"/>

  <!-- Flying notes -->
  <rect x="300" y="60" width="60" height="24" rx="4" fill="#ffffff" transform="rotate(-20 300 60)"/>
  <rect x="340" y="90" width="60" height="24" rx="4" fill="#ffffff" transform="rotate(15 340 90)"/>
</svg>
