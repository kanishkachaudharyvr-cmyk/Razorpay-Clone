<svg width="600" height="450" viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eaf0ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="450" rx="30" fill="url(#bgGrad)"/>

  <!-- Blue geometric shape -->
  <polygon points="380,0 600,0 600,220" fill="#2b4cff"/>

  <!-- Mock payment card -->
  <rect x="120" y="130" width="260" height="160" rx="16" fill="#ffffff" stroke="#dbe3ff" stroke-width="2"/>
  <rect x="140" y="160" width="90" height="18" rx="4" fill="#2b4cff"/>
  <rect x="140" y="200" width="180" height="12" rx="6" fill="#e0e7ff"/>
  <rect x="140" y="225" width="140" height="12" rx="6" fill="#e0e7ff"/>

  <!-- Decorative dots -->
  <circle cx="470" cy="260" r="6" fill="#ffffff"/>
  <circle cx="500" cy="290" r="4" fill="#ffffff"/>
  <circle cx="450" cy="310" r="5" fill="#ffffff"/>
</svg>
